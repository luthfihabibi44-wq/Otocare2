<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Unit Baru - OtoCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa;
        }
        .navbar-custom {
            background-color: transparent;
            padding: 1.5rem 0;
        }
        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #000;
            text-decoration: none;
        }
        .brand-logo i {
            color: #0d6efd;
            margin-right: 0.5rem;
        }
        .card-custom {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            background-color: #fff;
            padding: 2.5rem;
        }
        .form-control, .form-select {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }
        .form-control:focus, .form-select:focus {
            background-color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        .btn-custom-primary {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #212529;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom">
        <div class="container">
            <a class="brand-logo" href="index.html">
                <i class="bi bi-cpu-fill"></i>OtoCare
            </a>
            <a href="armada.html" class="btn btn-outline-dark btn-custom-primary">
                <i class="bi bi-shield-shaded me-2"></i>Data Armada
            </a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card-custom">
                    <div class="text-center mb-5">
                        <span class="badge bg-primary-subtle text-primary mb-2 px-3 py-2 rounded-pill fw-semibold">Sistem Registrasi</span>
                        <h2 class="fw-bold text-dark">Registrasi Unit Baru</h2>
                        <p class="text-muted">Masukkan telemetri awal kendaraan untuk memulai pemantauan</p>
                    </div>

                    <form id="formMotor">
                        <!-- DATA UTAMA KENDARAAN -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Nama Unit / Kendaraan</label>
                                <input type="text" id="nama" class="form-control" placeholder="Contoh: Honda Vario 160" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Nomor Plat Nomor</label>
                                <input type="text" id="plat" class="form-control" placeholder="Contoh: D 4321 ABC" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Jenis Penggerak / Transmisi</label>
                                <select id="jenis" class="form-select">
                                    <option value="Matic">Matic (CVT & Gardan)</option>
                                    <option value="Manual/Bebek">Manual / Bebek (Rantai & Kopling)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Kilometer (KM) Saat Ini</label>
                                <input type="number" id="km_sekarang" class="form-control" placeholder="Contoh: 12500" required>
                            </div>
                        </div>

                        <!-- INPUT RIWAYAT SERVIS KOMPONEN -->
                        <div class="section-title"><i class="bi bi-tools me-2 text-primary"></i>Riwayat Penggantian Suku Cadang Berjalan</div>
                        <p class="text-muted small mb-4">Isi data di bawah ini jika komponen sudah pernah diganti sebelumnya. Jika belum tahu, kosongkan saja (otomatis mengikuti KM saat ini).</p>

                        <!-- Sektor Oli -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">Tanggal Terakhir Ganti Oli</label>
                                <input type="date" id="tgl_oli" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">KM Terakhir Ganti Oli</label>
                                <input type="number" id="km_oli" class="form-control" placeholder="Kosongkan jika sama dengan KM saat ini">
                            </div>
                        </div>

                        <!-- Sektor Mesin -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">Tanggal Terakhir Tune-Up Mesin</label>
                                <input type="date" id="tgl_mesin" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">KM Terakhir Tune-Up Mesin</label>
                                <input type="number" id="km_mesin" class="form-control" placeholder="Kosongkan jika sama dengan KM saat ini">
                            </div>
                        </div>

                        <!-- Sektor Transmisi (CVT/Rantai) -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">Tanggal Servis CVT / Rantai</label>
                                <input type="date" id="tgl_cvt" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">KM Servis CVT / Rantai</label>
                                <input type="number" id="km_cvt" class="form-control" placeholder="Kosongkan jika sama dengan KM saat ini">
                            </div>
                        </div>

                        <!-- Sektor Kaki-Kaki -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">Tanggal Servis Rem & Kaki-kaki</label>
                                <input type="date" id="tgl_kaki" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">KM Servis Rem & Kaki-kaki</label>
                                <input type="number" id="km_kaki" class="form-control" placeholder="Kosongkan jika sama dengan KM saat ini">
                            </div>
                        </div>

                        <!-- Sektor Kelistrikan -->
                        <div class="row g-3 mb-5">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">Tanggal Cek Aki & Kelistrikan</label>
                                <input type="date" id="tgl_listrik" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-secondary">KM Cek Aki & Kelistrikan</label>
                                <input type="number" id="km_listrik" class="form-control" placeholder="Kosongkan jika sama dengan KM saat ini">
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-custom-primary text-white">
                                <i class="bi bi-plus-circle me-2"></i>Simpan & Daftarkan Unit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formMotor').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const km_sekarang = parseInt(document.getElementById('km_sekarang').value);
            const hari_ini_str = new Date().toISOString().split('T')[0];

            // Mengambil nilai input riwayat, jika kosong otomatis diisi hari ini / km sekarang
            const newMotor = {
                id: Date.now(),
                nama: document.getElementById('nama').value,
                plat: document.getElementById('plat').value,
                jenis: document.getElementById('jenis').value,
                km_sekarang: km_sekarang,
                
                tgl_oli: document.getElementById('tgl_oli').value || hari_ini_str,
                km_oli: parseInt(document.getElementById('km_oli').value) || km_sekarang,
                
                tgl_mesin: document.getElementById('tgl_mesin').value || hari_ini_str,
                km_mesin: parseInt(document.getElementById('km_mesin').value) || km_sekarang,
                
                tgl_cvt: document.getElementById('tgl_cvt').value || hari_ini_str,
                km_cvt: parseInt(document.getElementById('km_cvt').value) || km_sekarang,
                
                tgl_kaki: document.getElementById('tgl_kaki').value || hari_ini_str,
                km_kaki: parseInt(document.getElementById('km_kaki').value) || km_sekarang,
                
                tgl_listrik: document.getElementById('tgl_listrik').value || hari_ini_str,
                km_listrik: parseInt(document.getElementById('km_listrik').value) || km_sekarang
            };

            let kendaraanList = JSON.parse(localStorage.getItem('kendaraan')) || [];
            kendaraanList.push(newMotor);
            localStorage.setItem('kendaraan', JSON.stringify(kendaraanList));

            window.location.href = 'armada.html';
        });
    </script>
</body>
</html>
